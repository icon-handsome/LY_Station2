[App]
version=0.1.0
environment=production

[Debug]
; 实测与 PLC 联调时关闭，避免抢占视觉流水线
autoLatencyBundleTestEnabled=false
autoLatencyBundleTestDelayMs=30000
autoLatencyBundleTestPeriodic=false

[Logger]
level=1
; rotateDays 为保留项，程序不会删除历史日志；每日独立文件 logs/scan_tracking_yyyy-MM-dd.txt
rotateDays=0

[Modbus]
host=192.168.8.13
port=502
unitId=1
timeoutMs=1000
reconnectIntervalMs=2000

[Camera]
defaultCamera=Mech-Eye Nano
scanTimeoutMs=5000

[Station]
; 1=第一工位封头（默认）  2=第二工位多模式
stationId=1
stationName=第一工位-封头
; 相对路径相对于 config.ini 所在目录，或相对于 exe 目录（与现有配置查找策略一致）
scanPathsConfigPath=config/scan_paths/station1_default.json
defaultWorkMode=MODE_END_CAP
profileIni=config/station_profiles/station1_endcap.ini

[Vision]
mechEyeCameraKey=192.168.8.20   
mechCaptureTimeoutMs=30000
mechDepthRangeMin=100
mechDepthRangeMax=2000
hikConnectTimeoutMs=3000
hikCaptureTimeoutMs=1000
; 海康双目 A/B 曝光（微秒），连接相机时写入 SDK
hikExposureTimeUs=50000
hikGain=0
hikSdkRoot=D:/work/LY/IPC-192.168.110.173_track-main/third_party/MVS
; 以下 GigE 双目 A/B 已废弃，由 hikCxpCameraA/B 替代（主流程不再启动）
;hikCameraAName=hik_camera_a
;hikCameraAKey=192.168.8.12
;hikCameraAIp=192.168.8.12
;hikCameraASerial=
;hikCameraBName=hik_camera_b
;hikCameraBKey=192.168.8.22
;hikCameraBIp=192.168.8.22
;hikCameraBSerial=
hikCameraCName=hik_camera_c
hikCameraCKey=192.168.8.100
hikCameraCIp=192.168.8.100
hikCameraCSerial=
; 海康 C 不走 SDK，以下 accessMode 仅保留配置项，程序不读取
hikCameraCAccessMode=monitor
hikCameraCTcpListenIp=192.168.8.130
hikCameraCTcpListenPort=8999
hikCameraCFtpDirectory=D:/HikCameraFTP

; CH250 CoaXPress（PCIe 采集卡）双目
hikCxpEnabled=true
hikCxpCaptureTimeoutMs=5000
hikCxpExposureTimeUs=50000
hikCxpGain=0
hikCxpSmokeOutputDir=D:/CxpSmokeTest
hikCxpCameraAName=ch250_a
hikCxpCameraAKey=DA9122997
hikCxpCameraASerial=DA9122997
hikCxpCameraBName=ch250_b
hikCxpCameraBKey=DA9122998
hikCxpCameraBSerial=DA9122998

[LbnPose]
enabled=true
; TODO(marker): 转盘未装标记点联调时 true，Rt 用单位阵、不跑 LBN；装标后改 false
useIdentityRtWithoutMarkers=true
dataRoot=D:/work/LY/IPC-192.168.110.173_track-main/third_party/LBN/data
templateFile=D:/work/LY/IPC-192.168.110.173_track-main/third_party/LBN/data/template-3D-ALL-Shift-Cut-Cut.txt
; 以下参数在 testdata/test scan_150200 离线调通；生产请多工况验证后再收紧，详见 docs/station1/算法使用API.md
minDistance=20
maxDistance=650
cosTolerance=0.05
minPercent=0.2
cloudSearchRadiusPx=20
markerMinArea=200
markerMaxArea=30000
markerIntensityThreshold=40
markerDebscanDistPx=120

[LbPose]
; 算法标定/GeoHash/Recon 参数以 trackConfigFile 为准（算法更新时替换该 ini 即可）
trackConfigFile=third_party/LB/track_config.ini
; 可选：覆盖 track_config.ini [Paths] template_points；空则沿用 track_config
templateFile=D:/work/LY/IPC-192.168.110.173_track-main/third_party/LB/data/template-3D-ALL-Shift-Cut-Cut.txt
; 以下仅离线路径/回退使用（在线 CXP 采集不使用）
dataRoot=D:/work/LY/IPC-192.168.110.173_track-main/third_party/LB/data
leftPattern=
rightPattern=

[FlowControl]
pollIntervalMs=500
heartbeatIntervalMs=1000
simulatedProcessingMs=300
; 临时 PLC 流程联调：true=不跑检测/位姿/点云后处理；扫描仍采集相机，点云握手后立即丢弃
algorithmBypassEnabled=true
; @deprecated 分段点云/海康已改内存缓存；仅 LatencyTest 等调试落盘可读此路径
scanCacheDirectory=
; @deprecated 不再控制分段 PLY 生命周期
retainSegmentPly=true

[PointCloudProcessing]
; Trig_ScanSegment 后 IPC 点云后处理（与 [Vision] mechDepthRange* 相机采集范围独立）
enabled=false
depthMinMm=100
depthMaxMm=700
outlierRemovalEnabled=true
outlierMeanK=50
outlierStddevMul=1.0
smoothingEnabled=true
mlsSearchRadiusMm=5.0
mlsPolynomialOrder=2
downsampleEnabled=true
voxelLeafSizeMm=2.0
minPointsAfterProcessing=1000

[Tracking]
; 单路径联调：转盘(段1)+封头5点(2-6)+转盘(7)+封头5点(8-12)；扫满 scanSegmentTotal 段后 Trig_Inspection
scanSegmentTotal=12

[Bevel]
configPath=bevel/config.txt
templateDir=bevel/data/templates
angleTolDeg=2.0
lengthTolMm=1.0
; 默认型号：type0 = 45°坡口 / 钝边6mm（另 type1 = 30° / 1mm，换型时由 Qt cmd.set_bevel_recipe 下发）
defaultBevelType=0
defaultAngleDeg=45.0
defaultLengthMm=6.0

[Hole]
configPath=hole/config/default.json
icpRmsMaxMm=5.0
cylinderRmsMaxMm=3.0

[InternalSurface]
configPath=internal_surface/config/algorithm_config.json
templateType=1
minDepthMm=0.0
minVolumeM3=0.0

[OrbbecGemini]
orbbecGeminiEnabled=true
orbbecGeminiSdkRoot=C:/Program Files/OrbbecSDK 2.8.6
orbbecGeminiSerial=
orbbecGeminiDeviceIndex=0
orbbecGeminiDepthWidth=640
orbbecGeminiDepthHeight=480
orbbecGeminiFps=15
orbbecGeminiCaptureTimeoutMs=5000
orbbecGeminiWarmupFrameCount=5
orbbecGeminiSaveCaptureToDisk=true
orbbecGeminiCaptureCacheDir=
orbbecGeminiEnableColorStream=false
; 设备 Ready 后自动采一帧并落盘；默认关闭，联调时改为 true
orbbecGeminiCaptureOnStart=false

[LivoxMid360]
livoxMid360Enabled=true
livoxMid360SdkRoot=third_party/Livox-SDK2
livoxMid360ConfigFile=bin/mid360_config.json
livoxMid360Serial=47MCNCN0035510
livoxMid360DiscoveryTimeoutMs=10000

[TfminiPlus]
; 第二工位吊装/内壁防碰辅助测距。联调时改 true，并填有 59 59 连续帧的 COM 口（常见 COM3/COM4）。
tfminiPlusEnabled=true
tfminiPlusPort=COM3
tfminiPlusBaudRate=115200
; 预留阈值：本阶段仅日志输出，不写 Modbus IPC_SafetyAction_Word。
collisionThresholdMm=0
; 是否打印每帧测距数据（dist/strength/reliable）。关闭：改为 false 并重启程序。
tfminiPlusLogFrames=false

[Hmi]
enabled=true
tcpPort=9900
; 演示/联调：true 时显控可发 cmd.debug_trigger_inspection 用缓存点云触发坡口测量（不写 PLC）
allowDebugTriggerInspection=false
