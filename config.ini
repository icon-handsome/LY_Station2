[App]
version=0.1.0
environment=production

[Debug]
; 实测与 PLC 联调时关闭，避免抢占视觉流水线
autoLatencyBundleTestEnabled=false
autoLatencyBundleTestDelayMs=30000
autoLatencyBundleTestPeriodic=false

[Logger]
level=1
; rotateDays 为保留项，程序不会删除历史日志；每日独立文件 logs/scan_tracking_yyyy-MM-dd.txt
rotateDays=0

[Modbus]
host=192.168.8.13
port=502
unitId=1
timeoutMs=1000
reconnectIntervalMs=2000

[Camera]
defaultCamera=Mech-Eye Nano
scanTimeoutMs=5000

[Vision]
mechEyeCameraKey=192.168.8.20   
mechCaptureTimeoutMs=30000
mechDepthRangeMin=100
mechDepthRangeMax=2000
hikConnectTimeoutMs=3000
hikCaptureTimeoutMs=1000
; 海康双目 A/B 曝光（微秒），连接相机时写入 SDK
hikExposureTimeUs=50000
hikGain=0
hikSdkRoot=D:/work/LY/IPC-192.168.110.173_track-main/third_party/MVS
hikCameraAName=hik_camera_a
hikCameraAKey=192.168.8.12
hikCameraAIp=192.168.8.12
hikCameraASerial=
hikCameraBName=hik_camera_b
hikCameraBKey=192.168.8.22
hikCameraBIp=192.168.8.22
hikCameraBSerial=
hikCameraCName=hik_camera_c
hikCameraCKey=192.168.8.100
hikCameraCIp=192.168.8.100
hikCameraCSerial=
hikCameraCAccessMode=monitor
hikCameraCTcpListenIp=192.168.8.13
hikCameraCTcpListenPort=8999
hikCameraCFtpDirectory=D:/HikCameraFTP

; CH250 CoaXPress（PCIe 采集卡）双目
hikCxpEnabled=true
hikCxpCaptureTimeoutMs=5000
hikCxpExposureTimeUs=50000
hikCxpGain=0
hikCxpSmokeOutputDir=D:/CxpSmokeTest
hikCxpCameraAName=ch250_a
hikCxpCameraAKey=DA9122997
hikCxpCameraASerial=DA9122997
hikCxpCameraBName=ch250_b
hikCxpCameraBKey=DA9122998
hikCxpCameraBSerial=DA9122998

[LbnPose]
enabled=true
; TODO(marker): 转盘未装标记点联调时 true，Rt 用单位阵、不跑 LBN；装标后改 false
useIdentityRtWithoutMarkers=true
dataRoot=D:/work/LY/IPC-192.168.110.173_track-main/third_party/LBN/data
templateFile=D:/work/LY/IPC-192.168.110.173_track-main/third_party/LBN/data/template-3D-ALL-Shift-Cut-Cut.txt
; 以下参数在 testdata/test scan_150200 离线调通；生产请多工况验证后再收紧，详见 docs/LBN离线调通交接说明.md
minDistance=20
maxDistance=650
cosTolerance=0.05
minPercent=0.2
cloudSearchRadiusPx=20
markerMinArea=200
markerMaxArea=30000
markerIntensityThreshold=40
markerDebscanDistPx=120

[LbPose]
dataRoot=D:/work/LY/IPC-192.168.110.173_track-main/third_party/LB/Data
leftPattern=
rightPattern=
templateFile=
minDistance=30.0
maxDistance=650.0
cosTolerance=0.015
minPercent=0.5

[FlowControl]
pollIntervalMs=500
heartbeatIntervalMs=1000
simulatedProcessingMs=300
; @deprecated 分段点云/海康已改内存缓存；仅 LatencyTest 等调试落盘可读此路径
scanCacheDirectory=
; @deprecated 不再控制分段 PLY 生命周期
retainSegmentPly=true

[PointCloudProcessing]
; Trig_ScanSegment 后 IPC 点云后处理（与 [Vision] mechDepthRange* 相机采集范围独立）
enabled=false
depthMinMm=100
depthMaxMm=700
outlierRemovalEnabled=true
outlierMeanK=50
outlierStddevMul=1.0
smoothingEnabled=true
mlsSearchRadiusMm=5.0
mlsPolynomialOrder=2
downsampleEnabled=true
voxelLeafSizeMm=2.0
minPointsAfterProcessing=1000

[Tracking]
; 单路径联调：转盘(段1)+封头6点(2-7)+转盘(8)+封头6点(9-14)；扫满 14 段后 Trig_Inspection
; 检测占位仍取段 1/2/3（算法本轮可忽略）
firstStationOuterSegmentIndex=1
firstStationInnerSegmentIndex=2
firstStationHoleSegmentIndex=3
scanSegmentTotal=14

[Hmi]
enabled=true
tcpPort=9900
; 演示/联调：true 时显控可发 cmd.debug_trigger_inspection 用缓存点云触发蓝友检测（不写 PLC）
allowDebugTriggerInspection=false
